
services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: soa_db
    ports:
      - "3306:3306"
    volumes:
      - ./database:/docker-entrypoint-initdb.d

  inventario:
    build: ./inventario
    ports:
      - "3001:3001"
    depends_on: [mysql]

  clientes:
    build: ./clientes
    ports:
      - "3002:3002"
    depends_on: [mysql]

  ventas:
    build: ./ventas
    ports:
      - "3003:3003"
    depends_on: [mysql]
